version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: tnp_database
      POSTGRES_USER:  praveen
      POSTGRES_PASSWORD:  praveen
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: jdbc:postgresql://postgres:5432/tnp_database
      DB_USERNAME: praveen
      DB_PASSWORD: praveen

      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      MAIL_USERNAME: birlap409@gamil.com
      MAIL_PASSWORD: tdkcvjzifpsxuhbu

      CLOUDINARY_CLOUD_NAME: da8nln7ne
      CLOUDINARY_API_KEY: 829759685932544
      CLOUDINARY_API_SECRET: rfcnZaKALnP6_mTtqH4ULFaqwE8

      JWT_SECRET_KEY: mysecretkeymysecretkeymysecretkeymysecretkey

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data: